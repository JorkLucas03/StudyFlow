name: Backend AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      EB_APPLICATION_NAME: studyflow-api
      EB_ENVIRONMENT_NAME: Studyflow-api-env
      EB_S3_BUCKET: elasticbeanstalk-us-east-2-288834682539
      VERSION_LABEL: studyflow-api-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package backend
        run: python backend/package_aws.py

      - name: Upload package to S3
        run: aws s3 cp studyflow-api.zip "s3://${EB_S3_BUCKET}/${VERSION_LABEL}.zip"

      - name: Create Elastic Beanstalk application version
        run: |
          EXISTING_VERSION="$(
            aws elasticbeanstalk describe-application-versions \
              --application-name "${EB_APPLICATION_NAME}" \
              --version-labels "${VERSION_LABEL}" \
              --query 'ApplicationVersions[0].VersionLabel' \
              --output text
          )"

          if [ "${EXISTING_VERSION}" = "${VERSION_LABEL}" ]; then
            echo "Elastic Beanstalk application version ${VERSION_LABEL} already exists; skipping creation."
          else
            aws elasticbeanstalk create-application-version \
              --application-name "${EB_APPLICATION_NAME}" \
              --version-label "${VERSION_LABEL}" \
              --source-bundle S3Bucket="${EB_S3_BUCKET}",S3Key="${VERSION_LABEL}.zip"
          fi

      - name: Update Elastic Beanstalk environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${EB_APPLICATION_NAME}" \
            --environment-name "${EB_ENVIRONMENT_NAME}" \
            --version-label "${VERSION_LABEL}"

name: Deploy to Cloud Run

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      SERVICE_NAME: agileflow-devops
      REGION: us-central1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Google Cloud CLI
        run: |
          if ! command -v gcloud >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates gnupg curl
            curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
              | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
            echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
              | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y google-cloud-cli
          fi
          gcloud --version

      - name: Authenticate to Google Cloud
        run: |
          OIDC_AUDIENCE="https://iam.googleapis.com/${WORKLOAD_IDENTITY_PROVIDER}"
          OIDC_TOKEN="$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${OIDC_AUDIENCE}" \
            | jq -r '.value')"

          printf "%s" "${OIDC_TOKEN}" > "${RUNNER_TEMP}/github-oidc-token.jwt"

          gcloud iam workload-identity-pools create-cred-config "${WORKLOAD_IDENTITY_PROVIDER}" \
            --service-account="${SERVICE_ACCOUNT}" \
            --credential-source-file="${RUNNER_TEMP}/github-oidc-token.jwt" \
            --output-file="${RUNNER_TEMP}/google-creds.json"

          gcloud auth login --cred-file="${RUNNER_TEMP}/google-creds.json"
          gcloud config set project "${PROJECT_ID}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --source . \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --allow-unauthenticated \
            --quiet

      - name: Show service URL
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format='value(status.url)')"
          echo "Cloud Run URL: ${SERVICE_URL}"
